{% extends "base.html" %}
{% block title %}注册 - 植物查询管理系统{% endblock %}
{% block extra_head %}
<style>
    .navbar, .footer { display: none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>🌿 创建账号</h1>
        <p class="subtitle">注册成为植物查询系统用户</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" class="form-control" placeholder="至少6位密码" required>
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" name="password2" class="form-control" placeholder="再次输入密码" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">✅ 注 册</button>
            </div>
        </form>
        <p class="alt-link">已有账号？<a href="{% url 'login' %}">返回登录</a></p>
    </div>
</div>
{% endblock %}
