{% extends "base.html" %}
{% block title %}注册 - 校园图书管理系统{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>📝 学生注册</h2>
        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="请输入密码（至少6位）" required>
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" name="password2" placeholder="请再次输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">注 册</button>
        </form>
        <p class="auth-footer">
            已有账号？<a href="{% url 'login' %}">立即登录</a>
        </p>
    </div>
</div>
{% endblock %}
