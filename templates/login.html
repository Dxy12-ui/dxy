{% extends "base.html" %}
{% block title %}登录 - 植物查询管理系统{% endblock %}
{% block extra_head %}
<style>
    .navbar, .footer { display: none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>🌿 植物查询管理系统</h1>
        <p class="subtitle">登录以使用完整功能</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">🔑 登 录</button>
            </div>
        </form>
        <p class="alt-link">还没有账号？<a href="{% url 'register' %}">立即注册</a></p>
    </div>
</div>
{% endblock %}
