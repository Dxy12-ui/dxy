{% extends "base.html" %}
{% block title %}{{ action }}图书{% endblock %}
{% block content %}
<div class="form-container">
    <h2>📝 {{ action }}图书</h2>
    <form method="post" class="admin-form">
        {% csrf_token %}
        <div class="form-group">
            <label>图书名称 *</label>
            <input type="text" name="title" value="{{ book.title|default:'' }}" required>
        </div>
        <div class="form-group">
            <label>作者 *</label>
            <input type="text" name="author" value="{{ book.author|default:'' }}" required>
        </div>
        <div class="form-group">
            <label>分类</label>
            <select name="category">
                <option value="">-- 请选择分类 --</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}" {% if book and book.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>总入库数量</label>
            <input type="number" name="total_num" value="{{ book.total_num|default:'1' }}" min="1">
        </div>
        <div class="form-group">
            <label>出版社</label>
            <input type="text" name="publish" value="{{ book.publish|default:'' }}">
        </div>
        <div class="form-group">
            <label>图书简介</label>
            <textarea name="desc" rows="5">{{ book.desc|default:'' }}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{% url 'admin_book_list' %}" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
